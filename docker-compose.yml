version: '3.8'

services:
  # Base de données PostgreSQL
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"

  # Ton API REST 
  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/mydb
    depends_on:
      - db
    ports:
      - "5000:5000"

  # Ton interface Web
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
