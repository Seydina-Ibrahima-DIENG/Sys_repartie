name: CI/CD Pipeline Startup

on:
  push:
    branches: [ main ] # Se déclenche à chaque push sur la branche main
  pull_request:
    branches: [ main ]

jobs:
  # ÉTAPE 1 : Vérification de la qualité du code (Linting)
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install flake8 # Outil de vérification de syntaxe

      - name: Lint with flake8
        run: flake8 backend --count --select=E9,F63,F7,F82 --show-source --statistics

  # ÉTAPE 2 : Test de construction des images Docker
  docker-build-test:
    needs: test-and-lint # Attends que les tests passent
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Build Backend Image
        run: docker build ./backend -t backend-test

      - name: Build Frontend Image
        run: docker build ./frontend -t frontend-test

  # ÉTAPE 3 : Validation des fichiers Kubernetes et Ansible
  infrastructure-check:
    needs: docker-build-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Ansible
        run: sudo apt-get install -y ansible

      - name: Ansible Syntax Check
        run: ansible-playbook ansible/deploy-k8s.yaml --syntax-check
